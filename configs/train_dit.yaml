model_name: "EDEN_DiT"
mixed_precision: "no"
cos_sim_mean: 0.990539
cos_sim_std: 0.0608093
vae_scaler: 0.179437
vae_shift: 0.770202
model_args:
  latent_dim: 16
  dim: 768
  num_heads: 12
  mlp_ratio: 4.0
  depth: 12
  qkv_bias: false
  attn_drop_rate: 0.
  proj_drop_rate: 0.
  use_xformers: true
vae_args:
  in_dim: 3
  out_dim: 3
  patch_size: 16
  hidden_dim: 768
  num_heads: 12
  mlp_ratio: 4.
  latent_dim: 16
  encoder_depth: 4
  decoder_depth: 4
  qkv_bias: false
  attn_drop_rate: 0.
  proj_drop_rate: 0.
  use_xformers: true
  add_attn_encoder: true
  add_attn_decoder: true
  add_attn_type: "temporal_attn"
dataset_name: "LAVIB"
val_dataset_name: "DAVIS"
multi_res: false

resolutions:
    - [256, 256]
    - [480, 854]
    - [720, 720]
    - [544, 1280]
dataset_args:
  LAVIB:
    split_name: "train"
    data_dir: ./Dataset/LAVIB/frames_all
    height: 480
    width: 854
    dur_list: [3, 5, 7]
    #dur_weights: [1.0, 0, 0]
  DAVIS:
    data_dir: ./Datasets/DAVIS
    height: 480
    width: 854
    is_val: true
  DAIN_HD:
    data_dir: ./Datasets/DAIN_HD
    res: 544
  SNU_FILM:
    data_dir: ./Datasets/SNU_FILM
    mode: easy

dataloader:
  batch_size: 16
  shuffle: true
  drop_last: true
  num_workers: 8
val_dataloader:
  batch_size: 16
  num_workers: 4
output_dir: ./Logs2 # experiment outputs dir
global_seed: 0
train_args:
  pretrained_vae_path: ./Checkpoints/eden_vae.pt  # pretrained vae ckpt path
  resume_from_ckpt: null  # pretrained dit ckpt path, if resume from pretrained dit
  epochs: 7
  base_lr: 1.0e-04
  optimizer:
    weight_decay: 1.0e-4
    betas: [0.9, 0.99]
    eps: 1.0e-06
  lr_scheduler: "cosine"
  warmup_steps: 100
  log_every_steps: 100
  ckpt_every_steps: 2000
  visual_every_steps: 2000
  visual_results_num: 4
  val_every_steps: 2000
  val_metric: "PSNR"
transport:
  path_type: Linear
  prediction: velocity
  sample_eps: null
  train_eps: null
  loss_weight: null